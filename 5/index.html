<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="scoreboard">
        <div class="team-container">
            <h2 class="team-title">HOME</h2>
            <div class="score-display" id="home-score">0</div>
            <div class="button-group">
                <button class="score-btn" id="home-plus-1" onclick="addhome1()">+1</button>
                <button class="score-btn" id="home-plus-2" onclick="addhome2()">+2</button>
                <button class="score-btn" id="home-plus-3" onclick="addhome3()">+3</button>
            </div>
        </div>

        <div class="team-container">
            <h2 class="team-title">Away</h2>
            <div class="score-display" id="guest-score">0</div>
            <div class="button-group">
                <button class="score-btn" id="guest-plus-1" onclick="addguest1()">+1</button>
                <button class="score-btn" id="guest-plus-2" onclick="addguest2()">+2</button>
                <button class="score-btn" id="guest-plus-3" onclick="addguest3()">+3</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
